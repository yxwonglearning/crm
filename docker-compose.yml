services:
  mysql:
    image: mysql:8.4
    container_name: crm_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: crm
      MYSQL_USER: crm_app
      MYSQL_PASSWORD: crm_app_password
      MYSQL_ROOT_PASSWORD: crm_root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
